<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamousData GH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<header>
<div class="logo">
<h2>📱 FamousData GH</h2>
</div>

<nav>
<a href="#">Home</a>
<a href="#">Buy Data</a>
<a href="#">Services</a>
</nav>
</header>

<section class="hero">
<div class="hero-text">
<h1>Fast & Cheap Data Bundles</h1>
<p>Buy MTN, Telecel & AT data instantly in Ghana.</p>
<button>Buy Now</button>
</div>
</section>

<section class="networks">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/New-mtn-logo.jpg/320px-New-mtn-logo.jpg">
<h3>MTN Data</h3>
<p>Affordable bundles</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Vodafone_icon.svg/512px-Vodafone_icon.svg.png">
<h3>Telecel Data</h3>
<p>Fast internet bundles</p>
</div>

<div class="card">
<img src="https://1000logos.net/wp-content/uploads/2022/09/AirtelTigo-Logo.png">
<h3>AT Data</h3>
<p>Cheap offers daily</p>
</div>

</section>

<section class="buy-form">
<h2>Buy Data Bundle</h2>

<form id="buyForm">

<input type="text"
placeholder="Enter Phone Number"
required>

<select required>
<option value="">Select Network</option>
<option>MTN</option>
<option>Telecel</option>
<option>AT</option>
</select>

<select required>
<option value="">Select Bundle</option>
<option>1GB - GH₵5</option>
<option>2GB - GH₵10</option>
<option>5GB - GH₵20</option>
<option>10GB - GH₵40</option>
</select>

<button type="submit">
Buy Now
</button>

</form>
</section>

<div class="popup" id="popup">
<h3>✅ Order Sent</h3>
<p>Admin approval SMS sent.</p>
</div>

<script src="script.js"></script>

</body>
</html>
